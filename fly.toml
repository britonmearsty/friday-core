app = "cinepro-core"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  CACHE_TYPE = "memory"
  CORS_ORIGIN = "*"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  [[services.ports]]
    port = 443
    handlers = ["tls"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
