# fly.toml app configuration file generated for cinepro-core-mellow-sunbeam-2117 on 2026-05-31T02:45:44+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cinepro-core-mellow-sunbeam-2117'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  CACHE_TYPE = 'memory'
  CORS_ORIGIN = '*'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = 'tcp'
  internal_port = 3000

  [[services.ports]]
    port = 443
    handlers = ['tls']

  [[services.ports]]
    port = 80
    handlers = ['http']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
